<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" fill="none">
  <rect width="800" height="1200" fill="#0f172a"/>
  
  <!-- Phone Frame -->
  <rect x="150" y="100" width="500" height="1000" rx="80" stroke="#334155" stroke-width="12" fill="#1e293b"/>
  <rect x="180" y="130" width="440" height="940" rx="60" fill="#f8fafc"/>
  
  <!-- Dynamic Notch -->
  <rect x="300" y="150" width="200" height="40" rx="20" fill="#0f172a"/>
  
  <!-- Notification Content -->
  <g transform="translate(210, 250)">
    <rect width="380" height="500" rx="40" fill="white" shadow="0 10 30 rgba(0,0,0,0.1)"/>
    <rect width="380" height="500" rx="40" stroke="#e2e8f0" stroke-width="2"/>
    
    <!-- Medal Icon -->
    <circle cx="190" cy="150" r="80" fill="#fef3c7"/>
    <path d="M190 100V200M140 150H240" stroke="#f59e0b" stroke-width="4" opacity="0.3"/>
    <circle cx="190" cy="150" r="50" fill="#f59e0b"/>
    <text x="178" y="172" fill="white" font-family="sans-serif" font-size="60" font-weight="900">1</text>
    
    <text x="190" y="300" text-anchor="middle" fill="#0f172a" font-family="sans-serif" font-size="32" font-weight="900">TAHNIAH!</text>
    <text x="190" y="350" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="20" font-weight="bold">Anak anda menang EMAS</text>
    
    <!-- Event Label -->
    <rect x="80" y="390" width="220" height="50" rx="25" fill="#f1f5f9"/>
    <text x="190" y="422" text-anchor="middle" fill="#1e293b" font-family="sans-serif" font-size="16" font-weight="900" style="text-transform:uppercase">100m Lelaki 1</text>
  </g>
  
  <!-- App Elements below notification -->
  <rect x="210" y="780" width="380" height="80" rx="20" fill="#e2e8f0" opacity="0.5"/>
  <rect x="210" y="880" width="380" height="80" rx="20" fill="#e2e8f0" opacity="0.5"/>
  
  <!-- Bottom Bar -->
  <rect x="325" y="1040" width="150" height="6" rx="3" fill="#cbd5e1"/>
</svg>
