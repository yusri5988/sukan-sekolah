<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" fill="none">
  <rect width="800" height="1000" fill="#f8fafc"/>
  
  <!-- Stylized Running Track Background -->
  <path d="M0 200C0 200 200 150 400 150C600 150 800 200 800 200V800C800 800 600 850 400 850C200 850 0 800 0 800V200Z" fill="#10b981" fill-opacity="0.1"/>
  <path d="M100 0V1000M250 0V1000M400 0V1000M550 0V1000M700 0V1000" stroke="#10b981" stroke-width="2" stroke-dasharray="10 10" opacity="0.2"/>

  <!-- Dashboard Card -->
  <rect x="100" y="250" width="600" height="500" rx="40" fill="white" shadow="0 20-50 rgba(0,0,0,0.1)"/>
  <rect x="100" y="250" width="600" height="500" rx="40" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Header inside card -->
  <rect x="140" y="300" width="520" height="80" rx="20" fill="#1e293b"/>
  <text x="180" y="352" fill="white" font-family="sans-serif" font-size="28" font-weight="900" style="text-transform:uppercase;letter-spacing:2px">Acara Semasa</text>
  
  <!-- Entry List -->
  <g transform="translate(140, 420)">
    <rect width="520" height="80" rx="16" fill="#f1f5f9"/>
    <circle cx="40" cy="40" r="15" fill="#10b981"/>
    <rect x="80" y="30" width="200" height="20" rx="10" fill="#cbd5e1"/>
    <rect x="420" y="30" width="60" height="20" rx="10" fill="#1e293b"/>
  </g>
  
  <g transform="translate(140, 520)">
    <rect width="520" height="80" rx="16" fill="#f1f5f9"/>
    <circle cx="40" cy="40" r="15" fill="#f59e0b"/>
    <rect x="80" y="30" width="240" height="20" rx="10" fill="#cbd5e1"/>
    <rect x="420" y="30" width="60" height="20" rx="10" fill="#1e293b"/>
  </g>
  
  <g transform="translate(140, 620)">
    <rect width="520" height="80" rx="16" fill="#f1f5f9"/>
    <circle cx="40" cy="40" r="15" fill="#3b82f6"/>
    <rect x="80" y="30" width="180" height="20" rx="10" fill="#cbd5e1"/>
    <rect x="420" y="30" width="60" height="20" rx="10" fill="#1e293b"/>
  </g>

  <!-- Floating Button -->
  <circle cx="650" cy="800" r="60" fill="#f97316"/>
  <path d="M630 800H670M650 780V820" stroke="white" stroke-width="8" stroke-linecap="round"/>
</svg>
